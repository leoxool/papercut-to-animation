# ArtClassroom Docker Compose
# 使用: docker-compose -f docker-compose.artclassroom.yml up -d

version: '3.8'

services:
  # 前端 (Nginx + SPA)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api-server
    networks:
      - artclassroom

  # API 服务器 (Express)
  api-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - PORT=3002
      - SUPABASE_URL=http://kong:8001
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "3002:3002"
    depends_on:
      - supabase-kong
    networks:
      - artclassroom

  # WebSocket 服务器
  websocket-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: node websocket-server.js
    ports:
      - "8080:8080"
    networks:
      - artclassroom

networks:
  artclassroom:
    external: true